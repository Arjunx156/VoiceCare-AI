[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header
markers =
    unit: unit tests (fast, no external services)
    integration: integration tests (uses in-memory DB)
    slow: tests that may take longer to run
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
